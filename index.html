<style>
/* --- Estilos Globales y Reset --- */
.bg-novel-body {
    background-color: #0b0c10 !important; /* Fondo ultra oscuro */
    color: #ffffff !important;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding-bottom: 50px;
}

/* --- Banner Superior --- */
.main-banner {
    background-color: #5c54b4; /* Morado característico */
    text-align: center;
    padding: 40px 20px;
}

.main-banner h1 {
    font-size: 2.5rem;
    font-weight: 600;
    margin-bottom: 5px;
    color: #ffffff;
}

.novel-count {
    font-size: 0.9rem;
    opacity: 0.8;
    color: #ffffff;
}

/* --- Sección de Filtros --- */
.filter-container {
    background-color: #12141c; 
    padding: 20px 10%;
    border-bottom: 1px solid #1f2330;
}

.filter-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
}

/* Botones de géneros */
.bg-novel-body .btn {
    background-color: #202433;
    color: #b0b5c1;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
}

.bg-novel-body .btn:hover {
    background-color: #2e344a;
    color: #fff;
}

.bg-novel-body .btn.active {
    background-color: #4a3fca;
    color: #fff;
}

.center-btn {
    display: flex;
    justify-content: center;
    margin-bottom: 25px;
}

.btn-more {
    background-color: #3b3399;
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: 15px;
    font-size: 0.75rem;
    cursor: pointer;
}

/* Filtros inferiores (Order By / Status) */
.sorting-options {
    display: flex;
    justify-content: center;
    gap: 40px;
    font-size: 0.85rem;
    color: #8c92a0;
    padding-bottom: 15px;
}

.sort-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.btn-group {
    background-color: #1a1d29;
    padding: 4px;
    border-radius: 6px;
    display: flex;
    gap: 2px;
}

.btn-sub {
    background: transparent;
    border: none;
    color: #8c92a0;
    padding: 6px 14px;
    font-size: 0.8rem;
    border-radius: 4px;
    cursor: pointer;
}

.btn-sub.active-purple {
    background-color: #4a3fca;
    color: #fff;
}

.btn-sub.active-blue {
    background-color: #3b66f5;
    color: #fff;
}

/* --- Sección de Contenido (Grid) --- */
.content-section {
    max-width: 1200px;
    margin: 40px auto 0 auto;
    padding: 0 20px;
}

.content-section h2 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 30px;
    font-weight: 500;
    color: #ffffff;
}

/* Rejilla responsiva */
.novel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    justify-content: center;
}

/* --- Tarjetas de Novela --- */
.novel-card {
    background-color: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.card-image {
    width: 100%;
    aspect-ratio: 1 / 1.4; 
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 8px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
}

.card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
}

.novel-card:hover .card-image img {
    transform: scale(1.05); 
}

.card-info {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.rank {
    font-size: 0.65rem;
    color: #8c92a0;
    font-weight: bold;
}

.novel-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: #e2e4e9 !important;
    line-height: 1.2;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;  
    overflow: hidden;
}

.chapters {
    font-size: 0.75rem;
    color: #8c92a0;
}

/* --- Ajustes Móviles --- */
@media (max-width: 600px) {
    .sorting-options {
        flex-direction: column;
        gap: 20px;
    }
    .novel-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 15px;
    }
}
</style>

<div class="bg-novel-body">

    <header class="main-banner">
        <h1>All Genres</h1>
        <p class="novel-count">11,038 novels found</p>
    </header>

    <section class="filter-container">

            <button class="btn">Anime</button>
            <button class="btn">Arts</button>
            <button class="btn">Comedy</button>
            <button class="btn">Drama</button>
            <button class="btn">Eastern</button>
            <button class="btn">Ecchi</button>
            <button class="btn">Fan-Fiction</button>
            <button class="btn">Fantasy</button>
        </div>
        
        <div class="center-btn">
            <button class="btn-more">Show More</button>
        </div>

        <div class="sorting-options">
            <div class="sort-group">
                <span>Order By</span>
                <div class="btn-group">
                    <button class="btn-sub">New</button>
                    <button class="btn-sub">Popular</button>
                    <button class="btn-sub active-purple">Updates</button>
                </div>
            </div>

            <div class="sort-group">
                <span>Status</span>
                <div class="btn-group">
                    <button class="btn-sub active-blue">All</button>
                    <button class="btn-sub">Ongoing</button>
                    <button class="btn-sub">Completed</button>
                </div>
            </div>
        </div>
    </section>

    <main class="content-section">
        <h2>Explore All Genres Novels</h2>
        
        <div class="novel-grid">
            
            <div class="novel-card">
                <div class="card-image">
                    <img src="https://via.placeholder.com/150x210" alt="Novel Cover">
                </div>
                <div class="card-info">
                    <span class="rank"># RANK 4083</span>

                </div>
            </div>

            <div class="novel-card">
                <div class="card-image">
                    <img src="https://via.placeholder.com/150x210" alt="Novel Cover">
                </div>
                <div class="card-info">
                    <span class="rank"># RANK 4124</span>
                    <h3 class="novel-title">The Invincible Son-in-Law</h3>
                    <span class="chapters">🗂️ 510 chapters</span>
                </div>
            </div>

            <div class="novel-card">
                <div class="card-image">
                    <img src="https://via.placeholder.com/150x210" alt="Novel Cover">
                </div>
                <div class="card-info">
                    <span class="rank"># RANK 1322</span>
                    <h3 class="novel-title">Kuroko no Basket: Honored One</h3>
                    <span class="chapters">🗂️ 119 chapters</span>
                </div>
            </div>

        </div>
    </main>
</div>
